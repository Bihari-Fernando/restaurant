name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # Pull latest code
            cd ~/restaurant
            git pull origin main

            # Rebuild and restart backend
            cd ~/restaurant/backend/queue-system
            docker stop restaurant-backend || true
            docker rm restaurant-backend || true
            docker build -t restaurant-backend .
            docker run -d --name restaurant-backend -p 9090:9090 restaurant-backend

            # Rebuild frontend
            cd ~/restaurant/frontend/restaurant-frontend
            npm install
            npm run build
            sudo cp -r build/* /var/www/html/